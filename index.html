<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Textures</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>

<header>
    <h1>Minecraft Textures</h1>
    <p>Texture Pack Downloads</p>
</header>

<div class="main-container">
    <div class="card">
        <h2>Azure 16x</h2>
        <img src="icon.png" alt="Icon" id="pack-icon" style="width: 100px; height: 100px; border-radius: 10px; cursor: pointer;">
        <p id="random-msg" style="color: #66d9ff; font-weight: bold; margin: 15px 0;">水色ベースのテクスチャです！</p>
        
        <div class="download-counter">
            <i class="fas fa-download"></i> <span id="dl-count">3</span> Downloads
        </div>

        <div id="pack-info-section" style="display: none; margin-top: 20px; text-align: left; font-size: 0.9rem; color: #ccc;">
            <p>Azure16xというテクスチャです。水色がベースのテクスチャで、1000人記念で配布しました。</p>
            <p>UIなどは見やすく調整し、装備やその他ツール類なども頑張ったので是非使ってほしいです！</p>
        </div>
        
        <a href="Azure_16x.mcpack" download class="download-btn" id="download-btn">Download</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
