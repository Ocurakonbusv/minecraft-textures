<!DOCTYPE html>
<html>
<head>
<title>Minecraft Textures</title>
<link rel="stylesheet" href="style.css">

<style>

    body {
        padding-bottom: 100px !important;
        margin: 0;
        background-color: #1a1a1a;
        color: #eee;
    }
    /* カードを縦に綺麗に並べるための外枠 */
    .main-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 40px;
    }
</style>
</head>

<button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>

<header>

    </div>
</header>
