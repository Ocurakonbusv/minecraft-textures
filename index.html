<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Textures</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>

<header>
    <h1>Minecraft Textures</h1>
    <p>Texture Pack Downloads</p>
</header>

<div class="main-container">
    <div class="card hidden">
        <h2>Azure 16x</h2>
        <div class="icon-container">
            <img src="icon.png" alt="Icon" id="pack-icon">
            <div id="random-msg" class="speech-bubble"></div>
        </div>
        
        <div class="download-counter">
            <i class="fas fa-download"></i> <span id="dl-count">3</span> Downloads
        </div>

        <div id="pack-info-section" class="info-section">
            <img src="screenshot1.png" alt="Screenshot" class="screenshot">
            <img src="screenshot2.png" alt="Screenshot" class="screenshot">
            <p>Azure16xというテクスチャです。水色がベースのテクスチャで、1000人記念で配布しました。<br>UIなどは見やすく調整し、装備やその他ツール類なども頑張ったので是非使ってほしいです！</p>
        </div>
        
        <a href="Azure_16x.mcpack" download class="download-btn" id="download-btn">Download</a>
    </div>

    <div class="card hidden" style="border: 2px dashed #444;">
        <h2>Next Texture</h2>
        <p><i class="fas fa-lock"></i> Coming Soon...</p>
        <button class="download-btn" style="background:#333; cursor:not-allowed;">Locked</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
