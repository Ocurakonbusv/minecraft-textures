<!DOCTYPE html>
<html>
<head>
<title>Minecraft Textures</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Minecraft Textures</h1>
    <p>Texture Pack Downloads</p>
</header>

<div class="card hidden">
    <h2>Azure 16x</h2>
    
    <img src="icon.png" alt="Pack Icon" id="pack-icon" style="width: 100px; height: 100px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #66d9ff; cursor: pointer; transition: transform 0.1s;">
    
    <p id="random-msg" style="color: #66d9ff; font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; width: 100%; text-align: center; display: block;"></p>
    
    <div id="pack-info-section" style="display: none; margin-top: 20px; text-align: center;">
        
        <img src="screenshot1.png" alt="Azure 16x スクショ1" style="width: 100%; max-width: 400px; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 10px; border: 1px solid #66d9ff; margin-bottom: 10px;">
        
        <img src="screenshot2.png" alt="Azure 16x スクショ2" style="width: 100%; max-width: 400px; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 10px; border: 1px solid #66d9ff; margin-bottom: 15px;">
        
        <p style="color: #eee; font-size: 1.1rem; line-height: 1.6; padding: 0 10px; text-align: left; margin-top: 15px; margin-bottom: 20px;">
            Azure16xというテクスチャです。水色がベースのテクスチャで、1000人記念で配布しました。
            UIなどは見やすく調整し、装備やその他ツール類なども頑張ったので是非使ってほしいです！
        </p>

    </div>
    
    <a href="Azure_16x.mcpack" download class="download-btn" id="download-btn">Download</a>
</div>

<script src="script.js"></script>
</body>
</html>
